<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IdeaForge</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>⚡ IdeaForge</h1>
    <p class="subtitle">Type one line. Get a full app blueprint.</p>

    <div class="input-row">
      <input
        type="text"
        id="ideaInput"
        placeholder="e.g. I want to build a time tracker app"
        autocomplete="off"
      />
      <button id="saveBtn">Save</button>
    </div>
    <div id="toast" class="toast hidden"></div>

    <div id="ideasList" class="ideas-list"></div>
  </div>
  <script src="app.js"></script>
</body>
</html>
